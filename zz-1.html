<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>404 page for old devices</title>
<style>
    
body {
    margin: 0;
    padding: 0;
    background: #E7EAEF;
    font-family: Arial, Helvetica, sans-serif;
    user-select: none !important;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

.error-box {
    width: 600px;
    position: absolute;
    left: 50%;
    top: 50%;
    margin-left: -300px;
    margin-top: -100px;
    text-align: center;
}

.error-title {
    color: #333;
    font-size: 54px;
    font-weight: bold;
}

.error-sub {
    color: #999;
    text-shadow: 0 1px 0px #fff;
    font-size: 18px;
    margin-top: 10px;
    margin-bottom: 30px;
}

.home-btn {
    display: inline-block;
    text-decoration: none;
    padding: 10px 80px;
    font-weight: bold;
    border: none;
    -webkit-border-radius: 6px;
    -moz-border-radius: 6px;
    border-radius: 6px;
    color: #ffffff;
    text-shadow: 0 -1px 0 #003aaf;
    background-color: #006dcc;
    background-image: -moz-linear-gradient(top, #0088cc, #0044cc);
    background-image: -webkit-gradient(linear, 0 0, 0 100%, from(#0088cc), to(#0044cc));
    background-image: -webkit-linear-gradient(top, #0088cc, #0044cc);
    background-image: -o-linear-gradient(top, #0088cc, #0044cc);
    background-image: linear-gradient(to bottom, #0088cc, #0044cc);
    background-repeat: repeat-x;
    box-shadow: 0 0 0 1px #0044cc;
    border-color: #0044cc #0044cc #002a80;
    box-shadow: inset 0 1px 0 rgba(155, 155, 155, 0), 0 1px 2px rgba(255, 0, 0, 0.05);
    border-color: rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.25);
    filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#ff0088cc', endColorstr='#ff0044cc', GradientType=0);
    filter: progid:DXImageTransform.Microsoft.gradient(enabled=false);
}

.home-btn:hover {
    color: #ffffff;
    text-decoration: none;
    background-color: #0044cc;
    background-image: -moz-linear-gradient(top, #0066cc, #003399);
    background-image: -webkit-gradient(linear, 0 0, 0 100%, from(#0066cc), to(#003399));
    background-image: -webkit-linear-gradient(top, #0066cc, #003399);
    background-image: -o-linear-gradient(top, #0066cc, #003399);
    background-image: linear-gradient(to bottom, #0066cc, #003399);
    background-repeat: repeat-x;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 1px 2px rgba(0,0,0,.20);
    border-color: #003399 #003399 #002266;
    filter: progid:DXImageTransform.Microsoft.gradient(startColorstr='#ff0066cc', endColorstr='#ff003399', GradientType=0);
}

.nav {
    width: 100%;
    position: fixed;
    padding: 20px;
}

.nav-logo {
    color: #666;
    text-shadow: 0 1px 0px #fff;
    font-size: 26px;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="nav">
   <div class="nav-logo">maxgfortes</div>
</div>
<div class="error-box">
    <div class="error-title">404</div>
    <div class="error-sub">The page you are looking for does not exist.</div>
    <a href="flat-design.html" class="home-btn">Back to Home</a>
</div>

</body>
</html>
