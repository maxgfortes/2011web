<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>404 page for old devices</title>
<style>

body {
    margin: 0;
    padding: 0;
    background: #0f0f0f;
    font-family: Arial, Helvetica, sans-serif;
    user-select: none !important;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

.error-box {
    width: 600px;
    position: absolute;
    left: 50%;
    top: 50%;
    margin-left: -300px;
    margin-top: -100px;
    text-align: center;
}

.error-title {
    color: #fff;
    font-size: 54px;
    font-weight: bold;
}

.error-sub {
    color: #999;
    font-size: 18px;
    margin-top: 10px;
    margin-bottom: 30px;
}

.home-btn {
    display: inline-block;
    background: #3a47b9;
    color: white;
    text-decoration: none;
    padding: 10px 30px;
    font-weight: bold;
    border: none;
    -webkit-border-radius: 10px;
    -moz-border-radius: 10px;
    border-radius: 10px;
}

.home-btn:hover {
    background: #313b9b;
}

</style>

</head>

<body>

<div class="error-box">
    <div class="error-title">404</div>
    <div class="error-sub">The page you are looking for does not exist.</div>
    <a href="index.html" class="home-btn">Back to Home</a>
</div>

</body>
</html>
